description: |
  LM77 digital temperature sensor

compatible: "lm77"

include: i2c-device.yaml

properties:
    int-gpios:
      type: phandle-array
      required: false
      description: |
        Identifies the INT signal, which is active-low open drain when
        produced by the sensor.
